{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
  </head>
  <body class="login-page">
    {% include "navbar.html" %}
    <main class="login-shell">
      <section class="login-card">
        <div class="login-visual">
          <div class="visual-orb orb-1"></div>
          <div class="visual-orb orb-2"></div>
          <div class="visual-orb orb-3"></div>
          <div class="visual-content">
            <p class="eyebrow">Acceso seguro</p>
            <h1>Bienvenido</h1>
            <p class="visual-copy">Ingresa con tu correo y contraseña para continuar.</p>
            <div class="visual-chip">Supli</div>
          </div>
        </div>
        <div class="login-form">
          <div class="form-head">
            <h2>Login</h2>
            <p>Tu portal privado, listo en segundos.</p>
          </div>
          {% if error %}
            <div class="alert">{{ error }}</div>
          {% endif %}
          <form method="post" autocomplete="on">
            {% csrf_token %}
            <div class="field">
              <label for="email">Correo</label>
              <input type="email" id="email" name="email" autocomplete="email" placeholder="tucorreo@dominio.com" required>
            </div>
            <div class="field">
              <label for="password">Contrasena</label>
              <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
            </div>
            <button class="btn-primary" type="submit">Entrar</button>
            <div class="helper-links">
              <a class="text-link" href="{% url 'recuperar_password' %}">Recuperar contrasena</a>
            </div>
          </form>
        </div>
      </section>
    </main>
    <script src="{% static 'js/login.js' %}"></script>
  </body>
</html>
